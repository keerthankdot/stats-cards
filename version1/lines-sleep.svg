<?xml version="1.0" encoding="UTF-8"?>
<svg class="sleep-lines__svg" viewBox="0 0 300 100" preserveAspectRatio="none">
          <defs>
            <linearGradient id="sleep-std-fill" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
